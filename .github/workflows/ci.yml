name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Public open-core shell: the full test suite (grammar/learned-cache tests) lives
# with the PRIVATE core and needs all runtime deps, so public CI just verifies the
# shell byte-compiles cleanly across supported Python versions.
jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile the shell (syntax check)
        run: python -m compileall -q main.py app_entry.py install_autostart.py make_shortcuts.py voiceclaw
